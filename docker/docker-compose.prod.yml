# CRMS CI G UK - Production Docker Compose with TLS
# Includes automatic SSL certificate provisioning

name: crms-ci-g-uk-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: crms-prod-postgres
    restart: always
    environment:
      POSTGRES_DB: crms
      POSTGRES_USER: crms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    networks:
      - crms-prod-network
    deploy:
      resources:
        limits:
          memory: 8G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "20"

  minio:
    image: minio/minio:latest
    container_name: crms-prod-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SITE_NAME: "CRMS CI G UK"
      MINIO_SITE_REGION: "eu-west-2"
    volumes:
      - minio_prod_data:/data
    networks:
      - crms-prod-network
    deploy:
      resources:
        limits:
          memory: 4G

  backend:
    image: ${REGISTRY:-quay.io}/crms-ci-g-uk/backend:${VERSION:-latest}
    container_name: crms-prod-backend
    restart: always
    depends_on:
      - postgres
      - minio
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crms
      SPRING_DATASOURCE_USERNAME: crms
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      HMRC_API_MODE: ${HMRC_API_MODE:-production}
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - uploads_prod:/data/uploads
    secrets:
      - source: postgres_password
        target: POSTGRES_PASSWORD
        uid: '999'
        gid: '999'
        mode:0440
    networks:
      - crms-prod-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G

  frontend:
    image: ${REGISTRY:-quay.io}/crms-ci-g-uk/frontend:${VERSION:-latest}
    container_name: crms-prod-frontend
    restart: always
    networks:
      - crms-prod-network
    deploy:
      replicas: 2

  nginx:
    image: nginx:1.25-alpine
    container_name: crms-prod-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_prod_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - crms-prod-network

  # Let's Encrypt Certificate Renewal
  certbot:
    image: certbot/certbot:latest
    container_name: crms-prod-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt:rw
      - ./nginx/html:/usr/share/nginx/html:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done;'"
    networks:
      - crms-prod-network
    profiles:
      - certbot

networks:
  crms-prod-network:
    driver: bridge

volumes:
  postgres_prod_data:
  minio_prod_data:
  uploads_prod:
  nginx_prod_logs:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
