# CRMS CI G UK - MinIO Service
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  namespace: crms
  labels:
    app: minio
    component: storage
spec:
  clusterIP: None
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: console
