# CRMS CI G UK - Kubernetes ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: crms-config
  namespace: crms
  labels:
    app: crms-ci-g-uk
    component: config
data:
  # Application
  SPRING_PROFILES_ACTIVE: "prod"
  TZ: "Europe/London"
  JAVA_OPTS: "-Xms512m -Xmx2g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError"
  
  # MinIO
  MINIO_ENDPOINT: "http://minio-service:9000"
  
  # HMRC API
  HMRC_API_MODE: "sandbox"
  
  # Server settings
  SERVER_PORT: "8080"
