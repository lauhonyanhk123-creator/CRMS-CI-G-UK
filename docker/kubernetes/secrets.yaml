# CRMS CI G UK - Kubernetes Secrets
apiVersion: v1
kind: Secret
metadata:
  name: crms-secrets
  namespace: crms
  labels:
    app: crms-ci-g-uk
    component: secrets
type: Opaque
stringData:
  # Database
  SPRING_DATASOURCE_PASSWORD: "CHANGE_ME"
  
  # MinIO
  MINIO_ACCESS_KEY: "CHANGE_ME"
  MINIO_SECRET_KEY: "CHANGE_ME"
  
  # Security
  APP_SECRET_KEY: "CHANGE_ME_32_CHARS"
  JWT_SECRET: "CHANGE_ME_64_CHARS_HEX"
