# CRMS CI G UK - PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: crms
  labels:
    app: postgres
    component: database
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
