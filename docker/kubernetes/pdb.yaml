# CRMS CI G UK - PodDisruptionBudget for Backend
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: crms
  labels:
    app: backend
    component: api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
---
# CRMS CI G UK - PodDisruptionBudget for Frontend
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: crms
  labels:
    app: frontend
    component: web
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
