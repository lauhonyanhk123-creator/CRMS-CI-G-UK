# CRMS CI G UK - Docker Compose Configuration
# Single-tenant self-hosted deployment for UK groundwork contractors

name: crms-ci-g-uk

services:
  # PostgreSQL 16 Database
  postgres:
    image: postgres:16-alpine
    container_name: crms-postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crms -d crms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      POSTGRES_DB: crms
      POSTGRES_USER: crms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    networks:
      - crms-network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: crms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-crms}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_SITE_NAME: "CRMS CI G UK"
      MINIO_SITE_REGION: "eu-west-2"
      TZ: "Europe/London"
    volumes:
      - minio_data:/data
    networks:
      - crms-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Backend API Service
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: crms-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crms
      SPRING_DATASOURCE_USERNAME: crms
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-crms}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      # Security
      APP_SECRET_KEY: ${APP_SECRET_KEY:-changeme}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      # HMRC Integration (sandbox by default)
      HMRC_API_MODE: sandbox
      # File storage
      STORAGE_PATH: /data
      # System
      JAVA_OPTS: "-Xms512m -Xmx2g -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-prod}
      TZ: Europe/London
    volumes:
      - uploads:/data/uploads
      - backups:/backups
    networks:
      - crms-network
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  # Frontend Web Application
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: crms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - crms-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: crms-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - crms-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # Backup Utility (optional)
  backup:
    image: postgres:16-alpine
    container_name: crms-backup
    restart: "no"
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: crms
      POSTGRES_USER: crms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      BACKUP_DIR: /backups
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./backups/postgres:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]
    networks:
      - crms-network
    profiles:
      - backup

networks:
  crms-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/postgres
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/minio
  uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/uploads
  backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/backups
  nginx_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/logs/nginx
