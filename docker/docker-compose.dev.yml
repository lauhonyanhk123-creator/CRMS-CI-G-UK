# CRMS CI G UK - Development Docker Compose
# Run: docker compose -f docker/docker-compose.dev.yml up
# Services: Postgres, MinIO, Redis, MailHog (all local, no real credentials needed)

name: crms-ci-g-uk-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: crms-dev-postgres
    environment:
      POSTGRES_DB: crms
      POSTGRES_USER: crms
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crms -d crms"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - crms-dev-network

  redis:
    image: redis:7-alpine
    container_name: crms-dev-redis
    ports:
      - "6379:6379"
    networks:
      - crms-dev-network

  minio:
    image: minio/minio:latest
    container_name: crms-dev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dev_user
      MINIO_ROOT_PASSWORD: dev_password
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO console: http://localhost:9001
    volumes:
      - minio_dev_data:/data
    networks:
      - crms-dev-network

  minio-init:
    image: minio/mc:latest
    container_name: crms-dev-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 dev_user dev_password;
      mc mb local/crms-documents --ignore-existing;
      mc mb local/crms-images --ignore-existing;
      mc mb local/crms-backups --ignore-existing;
      exit 0;
      "
    networks:
      - crms-dev-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: crms-dev-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI: http://localhost:8025
    networks:
      - crms-dev-network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: crms-dev-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crms
      SPRING_DATASOURCE_USERNAME: crms
      SPRING_DATASOURCE_PASSWORD: dev_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: dev_user
      MINIO_SECRET_KEY: dev_password
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Mail → MailHog
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      # Security — dev-only placeholder key (32 bytes base64)
      JWT_SECRET: ZGV2LW9ubHktandrLXNlY3JldC1rZXktZG8tbm90LXVzZS1pbi1wcm9k
      APP_SECRET_KEY: dev-app-secret-key-not-for-production-use
      # Licence — unlimited for dev
      CRMS_LICENCE_TIER: ENTERPRISE
      CRMS_LICENCE_ENFORCEMENT_ENABLED: "false"
      # Profile
      SPRING_PROFILES_ACTIVE: dev
      JAVA_OPTS: "-Xms256m -Xmx1g -XX:+UseG1GC"
      TZ: Europe/London
    ports:
      - "8080:8080"
    networks:
      - crms-dev-network

  frontend:
    image: node:20-alpine
    container_name: crms-dev-frontend
    working_dir: /app
    command: sh -c "npm install -g pnpm@9 && pnpm install && pnpm run dev --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - crms-dev-network

networks:
  crms-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
  minio_dev_data:
  frontend_node_modules:
