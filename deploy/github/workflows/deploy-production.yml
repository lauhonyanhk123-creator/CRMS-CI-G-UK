name: Deploy to Production

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy'
        required: true

env:
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}
  DEPLOY_ENV: production

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/backend
          tags: |
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production images
        run: |
          VERSION=${VERSION:-${{ github.event.inputs.version || github.ref_name }}}
          
          docker build -f deploy/docker/Dockerfile.backend \
            --tag ${REGISTRY}/${REPOSITORY}/backend:${VERSION} \
            --tag ${REGISTRY}/${REPOSITORY}/backend:latest \
            ./backend
          
          docker build -f deploy/docker/Dockerfile.frontend \
            --tag ${REGISTRY}/${REPOSITORY}/frontend:${VERSION} \
            --tag ${REGISTRY}/${REPOSITORY}/frontend:latest \
            ./frontend

      - name: Push images
        run: |
          docker push ${REGISTRY}/${REPOSITORY}/backend:${VERSION}
          docker push ${REGISTRY}/${REPOSITORY}/backend:latest
          docker push ${REGISTRY}/${REPOSITORY}/frontend:${VERSION}
          docker push ${REGISTRY}/${REPOSITORY}/frontend:latest

      - name: Run database migrations
        run: |
          aws eks update-kubeconfig --name crms-production --region eu-west-2
          
          # Create a job to run migrations
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: crms-migrations-${{ github.run_id }}
            namespace: crms
          spec:
            template:
              spec:
                containers:
                - name: migrations
                  image: ${REGISTRY}/${REPOSITORY}/backend:${VERSION}
                  command: ["java", "-jar", "app.jar", "--spring.jpa.hibernate.ddl-auto=validate"]
                restartPolicy: Never
          EOF
          
          kubectl wait --for=condition=complete job/crms-migrations-${{ github.run_id }} -n crms --timeout=300s

      - name: Deploy to EKS
        run: |
          VERSION=${VERSION:-${{ github.event.inputs.version || github.ref_name }}}
          
          # Update images in deployment
          kubectl set image deployment/crms-backend backend=${REGISTRY}/${REPOSITORY}/backend:${VERSION} -n crms
          kubectl set image deployment/crms-frontend frontend=${REGISTRY}/${REPOSITORY}/frontend:${VERSION} -n crms
          
          # Wait for rollout
          kubectl rollout status deployment/crms-backend -n crms --timeout=600s
          kubectl rollout status deployment/crms-frontend -n crms --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n crms
          kubectl get services -n crms
          
          # Health check
          curl -f https://crms.example.com/actuator/health || exit 1

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            frontend/dist/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify success
        if: success()
        run: |
          echo "Production deployment completed successfully!"

      - name: Notify failure
        if: failure()
        run: |
          echo "Production deployment failed. Check logs above."
