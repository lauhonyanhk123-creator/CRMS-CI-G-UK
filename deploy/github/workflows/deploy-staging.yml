name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}
  DEPLOY_ENV: staging

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/backend
          tags: |
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build staging images
        run: |
          docker build -f deploy/docker/Dockerfile.backend \
            --tag ${REGISTRY}/${REPOSITORY}/backend:staging \
            --tag ${REGISTRY}/${REPOSITORY}/backend:${{ github.sha }} \
            ./backend
          
          docker build -f deploy/docker/Dockerfile.frontend \
            --tag ${REGISTRY}/${REPOSITORY}/frontend:staging \
            --tag ${REGISTRY}/${REPOSITORY}/frontend:${{ github.sha }} \
            ./frontend

      - name: Push images
        run: |
          docker push ${REGISTRY}/${REPOSITORY}/backend:staging
          docker push ${REGISTRY}/${REPOSITORY}/backend:${{ github.sha }}
          docker push ${REGISTRY}/${REPOSITORY}/frontend:staging
          docker push ${REGISTRY}/${REPOSITORY}/frontend:${{ github.sha }}

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name crms-staging --region eu-west-2
          
          # Update images in deployment
          kubectl set image deployment/crms-backend backend=${REGISTRY}/${REPOSITORY}/backend:${{ github.sha }} -n crms
          kubectl set image deployment/crms-frontend frontend=${REGISTRY}/${REPOSITORY}/frontend:${{ github.sha }} -n crms
          
          # Wait for rollout
          kubectl rollout status deployment/crms-backend -n crms --timeout=300s
          kubectl rollout status deployment/crms-frontend -n crms --timeout=300s

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/crms-backend -n crms
          kubectl get pods -n crms
          kubectl get services -n crms

      - name: Notify success
        if: success()
        run: |
          echo "Staging deployment completed successfully!"

      - name: Notify failure
        if: failure()
        run: |
          echo "Staging deployment failed. Check logs above."
