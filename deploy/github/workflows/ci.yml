name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crms_test
          POSTGRES_USER: crms
          POSTGRES_PASSWORD: crms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Download Maven wrapper
        working-directory: ./backend
        run: ./mvnw -N wrapper

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-backend-${{ hashFiles('backend/pom.xml') }}
          restore-keys: maven-backend-

      - name: Run tests
        working-directory: ./backend
        run: ./mvnw test -Dspring.datasource.url=jdbc:postgresql://localhost:5432/crms_test -Dspring.datasource.username=crms -Dspring.datasource.password=crms_test --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports
          retention-days: 7

      - name: Upload coverage
        if: success()
        with:
          files: backend/target/jacoco/jacoco.xml
          fail_ci_if_error: false

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Lint
        working-directory: ./frontend
        run: pnpm run lint

      - name: Type check
        working-directory: ./frontend
        run: pnpm run type-check

      - name: Unit tests
        working-directory: ./frontend
        run: pnpm run test:unit --run

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: |
            frontend/coverage
            frontend/test-results
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
