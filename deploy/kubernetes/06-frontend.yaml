apiVersion: apps/v1
kind: Deployment
metadata:
  name: crms-frontend
  namespace: crms
  labels:
    app: crms-frontend
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: crms-frontend
  template:
    metadata:
      labels:
        app: crms-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/crms-ci-g-uk/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: crms-frontend
  namespace: crms
  labels:
    app: crms-frontend
spec:
  selector:
    app: crms-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
