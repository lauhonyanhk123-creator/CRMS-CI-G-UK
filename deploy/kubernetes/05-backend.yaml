apiVersion: apps/v1
kind: Deployment
metadata:
  name: crms-backend
  namespace: crms
  labels:
    app: crms-backend
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: crms-backend
  template:
    metadata:
      labels:
        app: crms-backend
        tier: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/crms-ci-g-uk/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: crms-secrets
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: crms-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crms-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "validate"
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: crms-config
                  key: MINIO_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: crms-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: crms-secrets
                  key: MINIO_SECRET_KEY
            - name: APP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: crms-secrets
                  key: APP_SECRET_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: crms-secrets
                  key: JWT_SECRET
            - name: HMRC_API_MODE
              valueFrom:
                configMapKeyRef:
                  name: crms-config
                  key: HMRC_API_MODE
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: crms-config
                  key: SPRING_PROFILES_ACTIVE
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: crms-config
                  key: JAVA_OPTS
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: crms-backend
  namespace: crms
  labels:
    app: crms-backend
spec:
  selector:
    app: crms-backend
  ports:
    - port: 8080
      targetPort: 8080
      name: http
