apiVersion: v1
kind: Secret
metadata:
  name: crms-secrets
  namespace: crms
type: Opaque
stringData:
  # Spring Database
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres.crms-infra.svc.cluster.local:5432/crms"
  SPRING_DATASOURCE_USERNAME: "crms"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  
  # MinIO
  MINIO_ACCESS_KEY: "REPLACE_WITH_MINIO_ACCESS_KEY"
  MINIO_SECRET_KEY: "REPLACE_WITH_MINIO_SECRET_KEY"
  
  # Security
  APP_SECRET_KEY: "REPLACE_WITH_APP_SECRET_KEY_32_CHARS"
  JWT_SECRET: "REPLACE_WITH_JWT_SECRET_KEY"
  
  # Database password (base64 encoded in actual deployment)
  postgres-password: "REPLACE_WITH_POSTGRES_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: crms-tls-cert
  namespace: crms
type: kubernetes.io/tls
stringData:
  # Replace with actual certificate data in production
  tls.crt: "REPLACE_WITH_TLS_CERTIFICATE"
  tls.key: "REPLACE_WITH_TLS_PRIVATE_KEY"
