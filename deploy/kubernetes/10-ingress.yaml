apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crms-ingress
  namespace: crms
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
    - hosts:
        - crms.example.com
      secretName: crms-tls-cert
  rules:
    - host: crms.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: crms-backend
                port:
                  number: 8080
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: crms-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crms-frontend
                port:
                  number: 80
