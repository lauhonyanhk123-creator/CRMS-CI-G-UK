apiVersion: apps/v1
kind: Deployment
metadata:
  name: crms-nginx
  namespace: crms
  labels:
    app: crms-nginx
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crms-nginx
  template:
    metadata:
      labels:
        app: crms-nginx
        tier: gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: tls-cert
              mountPath: /etc/nginx/ssl
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: crms-nginx-config
        - name: tls-cert
          secret:
            secretName: crms-tls-cert
---
apiVersion: v1
kind: Service
metadata:
  name: crms-nginx
  namespace: crms
  labels:
    app: crms-nginx
spec:
  type: LoadBalancer
  selector:
    app: crms-nginx
  ports:
    - port: 80
      targetPort: 80
      name: http
    - port: 443
      targetPort: 443
      name: https
