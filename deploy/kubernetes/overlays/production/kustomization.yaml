apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: crms

resources:
  - ../../base

images:
  - name: ghcr.io/crms-ci-g-uk/backend
    newTag: latest
  - name: ghcr.io/crms-ci-g-uk/frontend
    newTag: latest

configMapGenerator:
  - name: crms-config
    behavior: replace
    literals:
      - SPRING_PROFILES_ACTIVE=prod
      - HMRC_API_MODE=production
      - LOGGING_LEVEL=INFO

replicas:
  - name: crms-backend
    count: 3
  - name: crms-frontend
    count: 3
