# CRMS CI G UK - Staging Docker Compose
# Pre-production environment for testing

name: crms-ci-g-uk-staging

services:
  postgres:
    image: postgres:16-alpine
    container_name: crms-staging-postgres
    restart: always
    environment:
      POSTGRES_DB: crms
      POSTGRES_USER: crms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      - crms-staging-network
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  redis:
    image: redis:7-alpine
    container_name: crms-staging-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_staging_data:/data
    networks:
      - crms-staging-network
    deploy:
      resources:
        limits:
          memory: 1G

  minio:
    image: minio/minio:latest
    container_name: crms-staging-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SITE_NAME: "CRMS CI G UK Staging"
      MINIO_SITE_REGION: "eu-west-2"
    volumes:
      - minio_staging_data:/data
    networks:
      - crms-staging-network
    deploy:
      resources:
        limits:
          memory: 2G

  backend:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-crms-ci-g-uk}/backend:${VERSION:-staging}
    container_name: crms-staging-backend
    restart: always
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crms
      SPRING_DATASOURCE_USERNAME: crms
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_PROFILES_ACTIVE: staging
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      HMRC_API_MODE: sandbox
      SERVER_PORT: 8080
      JAVA_OPTS: "-Xmx2g -Xms512m -XX:+UseG1GC"
    volumes:
      - uploads_staging:/data/uploads
    networks:
      - crms-staging-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 3G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  frontend:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-crms-ci-g-uk}/frontend:${VERSION:-staging}
    container_name: crms-staging-frontend
    restart: always
    networks:
      - crms-staging-network
    deploy:
      replicas: 2
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  nginx:
    image: nginx:1.25-alpine
    container_name: crms-staging-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_staging_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - crms-staging-network

networks:
  crms-staging-network:
    driver: bridge

volumes:
  postgres_staging_data:
  redis_staging_data:
  minio_staging_data:
  uploads_staging:
  nginx_staging_logs:
