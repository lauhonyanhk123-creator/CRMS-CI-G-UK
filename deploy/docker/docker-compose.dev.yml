# CRMS CI G UK - Development Docker Compose
# Full stack local development environment

name: crms-ci-g-uk-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: crms-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crms
      POSTGRES_USER: crms
      POSTGRES_PASSWORD: dev_password_change_in_production
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ../backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crms -d crms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crms-dev-network

  redis:
    image: redis:7-alpine
    container_name: crms-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crms-dev-network

  minio:
    image: minio/minio:latest
    container_name: crms-dev-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_SITE_NAME: "CRMS CI G UK Dev"
      MINIO_SITE_REGION: "eu-west-2"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - crms-dev-network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: crms-dev-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crms
      SPRING_DATASOURCE_USERNAME: crms
      SPRING_DATASOURCE_PASSWORD: dev_password_change_in_production
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: dev
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      APP_SECRET_KEY: dev_secret_key_change_in_production_32chars
      JWT_SECRET: dev_jwt_secret_key_please_change_in_production
      HMRC_API_MODE: sandbox
      LOGGING_LEVEL_UK_GOV: DEBUG
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ../backend:/app
      - uploads_dev:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - crms-dev-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=http://localhost:8080/api
        - VITE_APP_TITLE=CRMS CI G UK (Dev)
    container_name: crms-dev-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - crms-dev-network

networks:
  crms-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
  redis_dev_data:
  minio_dev_data:
  uploads_dev:
