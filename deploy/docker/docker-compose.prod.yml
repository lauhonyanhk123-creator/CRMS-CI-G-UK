# CRMS CI G UK - Production Docker Compose
# High availability production environment with TLS

name: crms-ci-g-uk-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: crms-prod-postgres
    restart: always
    environment:
      POSTGRES_DB: crms
      POSTGRES_USER: crms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_GB.UTF-8"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    networks:
      - crms-prod-network
    deploy:
      resources:
        limits:
          memory: 8G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "20"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crms -d crms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crms-prod-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_prod_data:/data
    networks:
      - crms-prod-network
    deploy:
      resources:
        limits:
          memory: 3G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  minio:
    image: minio/minio:latest
    container_name: crms-prod-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SITE_NAME: "CRMS CI G UK"
      MINIO_SITE_REGION: "eu-west-2"
      MINIO_STORAGE_CLASS_STANDARD: EC:2
    volumes:
      - minio_prod_data:/data
    networks:
      - crms-prod-network
    deploy:
      resources:
        limits:
          memory: 4G

  backend:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-crms-ci-g-uk}/backend:${VERSION:-latest}
    container_name: crms-prod-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crms
      SPRING_DATASOURCE_USERNAME: crms
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_PROFILES_ACTIVE: prod
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      HMRC_API_MODE: ${HMRC_API_MODE:-production}
      SERVER_PORT: 8080
      JAVA_OPTS: "-Xmx4g -Xms1g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError"
    volumes:
      - uploads_prod:/data/uploads
    networks:
      - crms-prod-network
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "20"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-crms-ci-g-uk}/frontend:${VERSION:-latest}
    container_name: crms-prod-frontend
    restart: always
    networks:
      - crms-prod-network
    deploy:
      replicas: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    container_name: crms-prod-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_prod_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - crms-prod-network
    deploy:
      resources:
        limits:
          memory: 256M

  certbot:
    image: certbot/certbot:latest
    container_name: crms-prod-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt:rw
      - ./nginx/html:/usr/share/nginx/html:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done;'"
    networks:
      - crms-prod-network
    profiles:
      - certbot

networks:
  crms-prod-network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:
  uploads_prod:
  nginx_prod_logs:
