server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json
    min-response-size: 1024

spring:
  application:
    name: crms-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/crms
    username: crms
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: CRMS-HikariPool

  # Flyway — run migrations on startup, validate against historical checksums
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: '0'
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true
    connect-retries: 3
    connect-retries-interval: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 6000ms
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: crms-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          jobStore:
            class: org.quartz.impl.jdbcjobstore.JobStoreTX
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            tablePrefix: QRTZ_
            isClustered: false
            useProperties: false
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# CRMS Application Configuration
crms:
  # CORS — override with environment variable or deployment config
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    max-age: 3600
    allow-credentials: true

  # Email notifications
  mail:
    from: ${MAIL_FROM:noreply@crms.local}
    admin-address: ${MAIL_ADMIN:admin@crms.local}

  # Audit — immutable append-only log
  audit:
    hash-algorithm: SHA-256
    hash-chain-enabled: true
    retention-days: 2555  # 7 years per UK tax requirement

  # PDF / document generation
  document:
    company-name: "CRMS CI G UK"
    company-address: "UK Office"
    vat-rate: 20.0

  # Payment defaults (UK construction)
  payment:
    default-payment-days: 30
    final-date-for-payment-offset-days: 14
    pay-less-notice-prescribed-period-days: 7
    default-retention-percent: 5.0
    default-retention-reduction-percent: 2.5

  # RAMS defaults
  rams:
    default-validity-days: 90
    induction-default-validity-hours: 24

  # CIS — HMRC sandbox by default
  cis:
    api-mode: ${CIS_API_MODE:sandbox}  # 'sandbox' or 'live'
    hmrc-base-url: ${HMRC_BASE_URL:https://test-api.service.hmrc.gov.uk}
    vat-rate: 20.0
    landfill-tax-standard: 126.15   # £/tonne 2025/26
    landfill-tax-inert: 4.05          # £/tonne 2025/26

  # External API Integration Configuration
  integration:
    demo-mode: true  # Set to false with real API keys for production
    hmrc:
      client-id: ${HMRC_CLIENT_ID:}
      client-secret: ${HMRC_CLIENT_SECRET:}
      base-url: ${HMRC_BASE_URL:https://test-api.service.hmrc.gov.uk}
      # Token refresh configuration (seconds)
      token-refresh-buffer-seconds: 300  # Proactively refresh 5 minutes before expiry
      token-expiry-buffer-seconds: 60    # Consider expired 60 seconds before actual expiry

# Application-level JWT config (also used by security config)
app:
  jwt:
    # Base64-encoded secret key (minimum 256 bits for HS256)
    # Generate with: openssl rand -base64 32 | tr -d '\n'
    # MUST override via JWT_SECRET environment variable in production
    secret: ${JWT_SECRET}
    # Access token: 15 minutes (900000 ms)
    expiration: 900000
    # Refresh token: 24 hours (86400000 ms)
    refresh-expiration: 86400000

  upload:
    base-path: ${UPLOAD_BASE_PATH:/var/crms/uploads}
    max-file-size: 104857600
    allowed-extensions: pdf,doc,docx,xls,xlsx,png,jpg,jpeg,dwg,dxf

# MinIO / S3-compatible object storage
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  buckets:
    documents: crms-documents
    images: crms-images
    backups: crms-backups

# Springdoc OpenAPI 2.x (Swagger UI)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
  show-actuator: false
  info:
    title: CRMS CI G UK REST API
    version: "1.0"
    description: Construction Resource Management System for the UK Groundworks Industry

# Actuator / Health Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: crms-backend

# Logging Configuration
logging:
  level:
    root: INFO
    com.crms: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:/var/log/crms/application.log}
    max-size: 100MB
    max-history: 30
